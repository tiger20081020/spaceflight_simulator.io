<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFS Realistic Simulator - AP CSP Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #00ff00;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .config-panel {
            background: rgba(0, 255, 0, 0.05);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
        }

        .graphs-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .graph-panel {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 15px;
            position: relative;
        }

        .graph-title {
            color: #00ff00;
            font-size: 1em;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
        }

        canvas {
            width: 100%;
            height: 300px;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
            border-radius: 5px;
            display: block;
            cursor: crosshair;
        }

        .data-tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #00ff00;
            border-radius: 5px;
            padding: 10px;
            color: #00ff00;
            font-size: 0.75em;
            pointer-events: none;
            z-index: 1000;
            display: none;
            min-width: 200px;
        }

        .tooltip-title {
            font-weight: bold;
            color: #ffff00;
            margin-bottom: 5px;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 3px;
        }

        .tooltip-row {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
        }

        .tooltip-label {
            color: #888;
        }

        .tooltip-value {
            color: #00ff00;
            font-weight: bold;
        }

        .destination-select {
            margin-bottom: 15px;
        }

        .destination-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .dest-btn {
            flex: 1;
            padding: 12px;
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .dest-btn:hover {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .dest-btn.active {
            background: rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .input-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #00ff00;
            font-size: 0.85em;
        }

        input[type="number"] {
            width: 100%;
            padding: 6px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }

        input[type="number"]:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .stage-config {
            background: rgba(0, 255, 0, 0.03);
            border: 1px solid #00ff00;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .stage-header {
            color: #00ff00;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 0.85em;
        }

        .stage-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        button {
            padding: 10px 20px;
            background: rgba(0, 255, 0, 0.2);
            border: 2px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            margin: 5px 0;
            transition: all 0.3s;
            width: 100%;
        }

        button:hover {
            background: rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .output-panel {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-entry {
            white-space: pre;
            font-size: 0.7em;
            line-height: 1.3;
        }

        .event {
            color: #ffff00;
            font-weight: bold;
        }

        .success {
            color: #00ff00;
            font-weight: bold;
        }

        .failure {
            color: #ff0000;
            font-weight: bold;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 10px;
        }

        .status-bar {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            padding: 8px;
            margin-top: 10px;
            border-radius: 5px;
            display: none;
            font-size: 0.8em;
        }

        .progress {
            color: #ffff00;
        }

        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 SPACEFLIGHT SIMULATOR - REALISTIC MISSION CALCULATOR</h1>
        <p class="subtitle">AP Computer Science Principles - Creative Performance Task</p>
        
        <div class="main-layout">
            <div class="left-panel">
                <div class="config-panel">
                    <div class="destination-select">
                        <label>Select Destination:</label>
                        <div class="destination-buttons">
                            <button class="dest-btn active" onclick="selectDestination('Venus', event)">
                                🌋 VENUS
                            </button>
                            <button class="dest-btn" onclick="selectDestination('Mars', event)">
                                🔴 MARS
                            </button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Number of Stages:</label>
                        <input type="number" id="numStages" value="1" min="1" max="5" onchange="generateStageInputs()">
                    </div>

                    <div id="stageInputs"></div>

                    <div class="input-group">
                        <label>Number of Parachutes:</label>
                        <input type="number" id="numChutes" value="20" min="0" max="100">
                    </div>

                    <div class="controls">
                        <button onclick="startSimulation()" id="startBtn">▶ START SIMULATION</button>
                        <button onclick="stopSimulation()" id="stopBtn" disabled>⏹ STOP</button>
                        <button onclick="clearOutput()">🗑 CLEAR ALL</button>
                    </div>

                    <div class="status-bar" id="statusBar">
                        <span class="progress" id="statusText">Initializing...</span>
                    </div>
                </div>

                <div class="output-panel" id="output"></div>
            </div>

            <div class="graphs-container">
                <div class="graph-panel">
                    <div class="graph-title">📈 VERTICAL ASCENT & ORBITAL INSERTION</div>
                    <canvas id="ascentGraph"></canvas>
                    <div class="data-tooltip" id="ascentTooltip"></div>
                </div>

                <div class="graph-panel">
                    <div class="graph-title">🚀 TRANSFER BURN (Earth to <span id="destName">Venus</span>)</div>
                    <canvas id="transferGraph"></canvas>
                    <div class="data-tooltip" id="transferTooltip"></div>
                </div>

                <div class="graph-panel">
                    <div class="graph-title">🔥 RE-ENTRY (<span id="destName2">Venus</span> Atmosphere)</div>
                    <canvas id="reentryGraph"></canvas>
                    <div class="data-tooltip" id="reentryTooltip"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedDestination = 'Venus';
        let simulationRunning = false;
        
        // Separate data arrays for each graph
        let ascentData = [];
        let transferData = [];
        let reentryData = [];
        
        // Selected points for each graph
        let selectedAscentPoint = null;
        let selectedTransferPoint = null;
        let selectedReentryPoint = null;
        
        let currentPhase = "";

        const canvasAscent = document.getElementById('ascentGraph');
        const canvasTransfer = document.getElementById('transferGraph');
        const canvasReentry = document.getElementById('reentryGraph');
        
        const ctxAscent = canvasAscent.getContext('2d');
        const ctxTransfer = canvasTransfer.getContext('2d');
        const ctxReentry = canvasReentry.getContext('2d');
        
        function resizeCanvases() {
            [canvasAscent, canvasTransfer, canvasReentry].forEach(canvas => {
                canvas.width = canvas.offsetWidth;
                canvas.height = 300;
            });
        }
        resizeCanvases();
        window.addEventListener('resize', resizeCanvases);

        // Add click event listeners to canvases
        canvasAscent.addEventListener('click', (e) => handleGraphClick(e, canvasAscent, ascentData, 'ascent'));
        canvasTransfer.addEventListener('click', (e) => handleGraphClick(e, canvasTransfer, transferData, 'transfer'));
        canvasReentry.addEventListener('click', (e) => handleGraphClick(e, canvasReentry, reentryData, 'reentry'));

        function handleGraphClick(event, canvas, data, graphType) {
            if (data.length < 2) return;

            const rect = canvas.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const clickY = event.clientY - rect.top;

            // Convert click coordinates to data space
            const padding = 50;
            const width = canvas.width - 2 * padding;
            const height = canvas.height - 2 * padding;

            const altitudes = data.map(d => d.alt);
            const horizontals = data.map(d => d.velH);
            const maxAlt = Math.max(...altitudes);
            const minAlt = Math.min(...altitudes, 0);
            const maxH = Math.max(...horizontals);
            const minH = Math.min(...horizontals);

            // Find closest point
            let closestPoint = null;
            let minDistance = Infinity;

            for (let i = 0; i < data.length; i++) {
                const point = data[i];
                const x = padding + ((point.velH - minH) / (maxH - minH)) * width;
                const y = padding + height - ((point.alt - minAlt) / (maxAlt - minAlt)) * height;

                const distance = Math.sqrt((x - clickX) ** 2 + (y - clickY) ** 2);
                if (distance < minDistance && distance < 30) { // 30px click tolerance
                    minDistance = distance;
                    closestPoint = point;
                }
            }

            if (closestPoint) {
                if (graphType === 'ascent') selectedAscentPoint = closestPoint;
                else if (graphType === 'transfer') selectedTransferPoint = closestPoint;
                else if (graphType === 'reentry') selectedReentryPoint = closestPoint;

                showTooltip(closestPoint, graphType, event.clientX, event.clientY);
            }
        }

        function showTooltip(point, graphType, mouseX, mouseY) {
            const tooltipId = graphType === 'ascent' ? 'ascentTooltip' : 
                             graphType === 'transfer' ? 'transferTooltip' : 'reentryTooltip';
            const tooltip = document.getElementById(tooltipId);

            const phase = point.phase || 'UNKNOWN';
            const temp = point.temp !== undefined ? point.temp.toFixed(1) + '°C' : 'N/A';
            const drag = point.drag !== undefined ? (point.drag / 1000).toFixed(1) + ' kN' : 'N/A';
            const grav = point.grav !== undefined ? (point.grav / 1000).toFixed(1) + ' kN' : 'N/A';

            tooltip.innerHTML = `
                <div class="tooltip-title">📊 DATA POINT - ${phase}</div>
                <div class="tooltip-row">
                    <span class="tooltip-label">Time:</span>
                    <span class="tooltip-value">${point.time.toFixed(1)} s</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">Altitude:</span>
                    <span class="tooltip-value">${(point.alt / 1000).toFixed(2)} km</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">Velocity:</span>
                    <span class="tooltip-value">${Math.sqrt(point.velH**2 + point.velV**2).toFixed(1)} m/s</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">V-Horizontal:</span>
                    <span class="tooltip-value">${point.velH.toFixed(1)} m/s</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">V-Vertical:</span>
                    <span class="tooltip-value">${point.velV.toFixed(1)} m/s</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">Drag Force:</span>
                    <span class="tooltip-value">${drag}</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">Grav Force:</span>
                    <span class="tooltip-value">${grav}</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">Temperature:</span>
                    <span class="tooltip-value">${temp}</span>
                </div>
            `;

            tooltip.style.display = 'block';
            tooltip.style.left = '10px';
            tooltip.style.top = '40px';
        }

        const PLANETS = {
            "Venus": {
                radius: 6051800,
                mass: 4.867e24,
                atmo: 150000,
                H: 15900,
                rho0: 67.0,
                color: '#FF6B35'
            },
            "Mars": {
                radius: 3389500,
                mass: 6.39e23,
                atmo: 125000,
                H: 11100,
                rho0: 0.020,
                color: '#E74C3C'
            }
        };

        const G = 6.67430e-11;
        const M_EARTH = 5.972e24;
        const G0_EARTH = 9.80665;
        const TIME_STEP = 0.1;
        const EARTH_SCALE_HEIGHT = 3200;
        const EARTH_RHO0 = 1.225;
        const HEAT_SHIELD_LIMIT = 6180.0;

        function drawGraph(ctx, data, title, xLabel, yLabel, showVelocity = false, planetRadius = 6371000, phase = '', selectedPoint = null) {
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            
            if (data.length < 2) return;
            
            const padding = 50;
            const width = ctx.canvas.width - 2 * padding;
            const height = ctx.canvas.height - 2 * padding;
            
            // Find data ranges
            const altitudes = data.map(d => d.alt);
            const horizontals = data.map(d => d.velH);
            
            const maxAlt = Math.max(...altitudes);
            const minAlt = Math.min(...altitudes, 0); // Include 0 (surface)
            const maxH = Math.max(...horizontals);
            const minH = Math.min(...horizontals);
            
            // Draw axes
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, padding + height);
            ctx.lineTo(padding + width, padding + height);
            ctx.stroke();
            
            // Draw grid
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.2)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding + (height / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(padding + width, y);
                ctx.stroke();
                
                const x = padding + (width / 5) * i;
                ctx.beginPath();
                ctx.moveTo(x, padding);
                ctx.lineTo(x, padding + height);
                ctx.stroke();
            }
            
            // Draw planet surface (horizontal line at altitude = 0)
            ctx.strokeStyle = '#4A90E2';
            ctx.lineWidth = 3;
            const surfaceY = padding + height - ((0 - minAlt) / (maxAlt - minAlt)) * height;
            ctx.beginPath();
            ctx.moveTo(padding, surfaceY);
            ctx.lineTo(padding + width, surfaceY);
            ctx.stroke();
            
            // Label the surface
            ctx.fillStyle = '#4A90E2';
            ctx.font = 'bold 11px Courier New';
            ctx.fillText('SURFACE (0 km)', padding + width + 5, surfaceY + 4);
            
            // Draw atmosphere boundary
            let atmosphereAlt = 100000; // Default Earth atmosphere
            if (phase === 'reentry') {
                atmosphereAlt = selectedDestination === 'Mars' ? 125000 : 150000;
            }
            
            if (atmosphereAlt >= minAlt && atmosphereAlt <= maxAlt) {
                const atmoY = padding + height - ((atmosphereAlt - minAlt) / (maxAlt - minAlt)) * height;
                ctx.strokeStyle = '#FF6B35';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(padding, atmoY);
                ctx.lineTo(padding + width, atmoY);
                ctx.stroke();
                ctx.setLineDash([]);
                
                ctx.fillStyle = '#FF6B35';
                ctx.font = 'bold 10px Courier New';
                ctx.fillText(`ATMOSPHERE (${(atmosphereAlt/1000).toFixed(0)} km)`, padding + width + 5, atmoY + 4);
            }
            
            // Draw orbit height line (150km) for ascent and transfer phases
            if (phase === 'ascent' || phase === 'transfer') {
                const orbitAlt = 150000;
                if (orbitAlt >= minAlt && orbitAlt <= maxAlt) {
                    const orbitY = padding + height - ((orbitAlt - minAlt) / (maxAlt - minAlt)) * height;
                    ctx.strokeStyle = '#9B59B6';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([10, 5]);
                    ctx.beginPath();
                    ctx.moveTo(padding, orbitY);
                    ctx.lineTo(padding + width, orbitY);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    ctx.fillStyle = '#9B59B6';
                    ctx.font = 'bold 10px Courier New';
                    ctx.fillText('TARGET ORBIT (150 km)', padding + width + 5, orbitY + 4);
                }
            }
            
            // Draw trajectory
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 3;
            ctx.beginPath();
            
            for (let i = 0; i < data.length; i++) {
                const point = data[i];
                const x = padding + ((point.velH - minH) / (maxH - minH)) * width;
                const y = padding + height - ((point.alt - minAlt) / (maxAlt - minAlt)) * height;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();
            
            // Draw selected point (if any)
            if (selectedPoint) {
                const x = padding + ((selectedPoint.velH - minH) / (maxH - minH)) * width;
                const y = padding + height - ((selectedPoint.alt - minAlt) / (maxAlt - minAlt)) * height;
                
                // Outer glow
                ctx.beginPath();
                ctx.arc(x, y, 12, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 0, 0.3)';
                ctx.lineWidth = 4;
                ctx.stroke();
                
                // Inner circle
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#FF00FF';
                ctx.fill();
                ctx.strokeStyle = '#FFFF00';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            // Draw current position (during simulation)
            if (data.length > 0 && !selectedPoint) {
                const last = data[data.length - 1];
                const x = padding + ((last.velH - minH) / (maxH - minH)) * width;
                const y = padding + height - ((last.alt - minAlt) / (maxAlt - minAlt)) * height;
                
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#FFFF00';
                ctx.fill();
                ctx.strokeStyle = '#00FF00';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            // Draw labels
            ctx.fillStyle = '#00ff00';
            ctx.font = '12px Courier New';
            ctx.fillText(`${yLabel} (km)`, padding - 40, padding - 10);
            ctx.fillText(`${xLabel} (m/s)`, padding + width - 50, padding + height + 35);
            
            // Draw scale values
            ctx.font = '10px Courier New';
            for (let i = 0; i <= 5; i++) {
                const altValue = minAlt + (maxAlt - minAlt) * (i / 5);
                const y = padding + height - (height / 5) * i;
                ctx.fillText((altValue / 1000).toFixed(0), 5, y + 4);
                
                const velValue = minH + (maxH - minH) * (i / 5);
                const x = padding + (width / 5) * i;
                ctx.fillText(velValue.toFixed(0), x - 15, padding + height + 20);
            }
        }

        function updateGraphs() {
            drawGraph(ctxAscent, ascentData, 'Ascent', 'Horizontal Vel', 'Altitude', false, 6371000, 'ascent', selectedAscentPoint);
            drawGraph(ctxTransfer, transferData, 'Transfer', 'Horizontal Vel', 'Altitude', false, 6371000, 'transfer', selectedTransferPoint);
            
            const destRadius = PLANETS[selectedDestination].radius;
            drawGraph(ctxReentry, reentryData, 'Re-entry', 'Horizontal Vel', 'Altitude', false, destRadius, 'reentry', selectedReentryPoint);
            
            requestAnimationFrame(updateGraphs);
        }
        updateGraphs();

        function selectDestination(dest, event) {
            selectedDestination = dest;
            document.querySelectorAll('.dest-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.dest-btn').classList.add('active');
            document.getElementById('destName').textContent = dest;
            document.getElementById('destName2').textContent = dest;
            ascentData = [];
            transferData = [];
            reentryData = [];
            selectedAscentPoint = null;
            selectedTransferPoint = null;
            selectedReentryPoint = null;
            document.getElementById('ascentTooltip').style.display = 'none';
            document.getElementById('transferTooltip').style.display = 'none';
            document.getElementById('reentryTooltip').style.display = 'none';
        }

        function generateStageInputs() {
            const numStages = parseInt(document.getElementById('numStages').value);
            const container = document.getElementById('stageInputs');
            container.innerHTML = '';

            for (let i = 1; i <= numStages; i++) {
                const stageDiv = document.createElement('div');
                stageDiv.className = 'stage-config';
                stageDiv.innerHTML = `
                    <div class="stage-header">Stage ${i}</div>
                    <div class="stage-inputs">
                        <div class="input-group">
                            <label>Wet Mass (t):</label>
                            <input type="number" id="s${i}_wet" value="10000" step="0.1">
                        </div>
                        <div class="input-group">
                            <label>Dry Mass (t):</label>
                            <input type="number" id="s${i}_dry" value="1" step="0.1">
                        </div>
                        <div class="input-group">
                            <label>Thrust (tf):</label>
                            <input type="number" id="s${i}_thrust" value="30000" step="1">
                        </div>
                        <div class="input-group">
                            <label>ISP (s):</label>
                            <input type="number" id="s${i}_isp" value="1145143" step="1">
                        </div>
                        <div class="input-group">
                            <label>CD (Ascent):</label>
                            <input type="number" id="s${i}_cd" value="0.6" step="0.01">
                        </div>
                        <div class="input-group">
                            <label>Area (m²) Ascent:</label>
                            <input type="number" id="s${i}_area" value="20" step="0.1">
                        </div>
                        <div class="input-group">
                            <label>CD (Re-entry):</label>
                            <input type="number" id="s${i}_cd_reentry" value="1.2" step="0.01">
                        </div>
                        <div class="input-group">
                            <label>Area (m²) Re-entry:</label>
                            <input type="number" id="s${i}_area_reentry" value="50" step="0.1">
                        </div>
                    </div>
                `;
                container.appendChild(stageDiv);
            }
        }

        function log(message, className = '') {
            const output = document.getElementById('output');
            const entry = document.createElement('div');
            entry.className = `log-entry ${className}`;
            entry.textContent = message;
            output.appendChild(entry);
            output.scrollTop = output.scrollHeight;
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = '';
            ascentData = [];
            transferData = [];
            reentryData = [];
            selectedAscentPoint = null;
            selectedTransferPoint = null;
            selectedReentryPoint = null;
            document.getElementById('ascentTooltip').style.display = 'none';
            document.getElementById('transferTooltip').style.display = 'none';
            document.getElementById('reentryTooltip').style.display = 'none';
        }

        function stopSimulation() {
            simulationRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('statusBar').style.display = 'none';
        }

        async function startSimulation() {
            clearOutput();
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('statusBar').style.display = 'block';
            
            simulationRunning = true;

            const numStages = parseInt(document.getElementById('numStages').value);
            const numChutes = parseInt(document.getElementById('numChutes').value);
            const dest = PLANETS[selectedDestination];

            const stages = [];
            for (let i = 1; i <= numStages; i++) {
                const wet = parseFloat(document.getElementById(`s${i}_wet`).value);
                const dry = parseFloat(document.getElementById(`s${i}_dry`).value);
                const thrust = parseFloat(document.getElementById(`s${i}_thrust`).value);
                const isp = parseFloat(document.getElementById(`s${i}_isp`).value);
                const cd = parseFloat(document.getElementById(`s${i}_cd`).value);
                const area = parseFloat(document.getElementById(`s${i}_area`).value);

                stages.push({
                    num: i,
                    total_mass_at_start: wet * 1000,
                    total_mass_at_end: dry * 1000,
                    fuel_mass: (wet - dry) * 1000,
                    fuel_curr: (wet - dry) * 1000,
                    thrust: thrust * 1000 * G0_EARTH,
                    isp: isp,
                    cd: cd,
                    area: area,
                    cd_reentry: parseFloat(document.getElementById(`s${i}_cd_reentry`).value),
                    area_reentry: parseFloat(document.getElementById(`s${i}_area_reentry`).value),
                    flow_rate: (thrust * 1000) / (isp > 0 ? isp : 1)
                });
            }

            log(`🚀 SFS REALISTIC SIM: EARTH -> ${selectedDestination.toUpperCase()}`);
            log('─'.repeat(180));
            log(`${'Time'.padEnd(10)}${'Alt(km)'.padEnd(10)}${'Fuel%'.padEnd(9)}${'Acc(g)'.padEnd(9)}${'Vel(m/s)'.padEnd(10)}${'V-Horiz'.padEnd(10)}${'V-Vert'.padEnd(10)}${'Drag(kN)'.padEnd(11)}${'Grav(kN)'.padEnd(11)}${'Temp(C)'.padEnd(10)}Phase`);
            log('─'.repeat(180));

            let time = 0.0, alt = 0.0, vel_v = 0.0, vel_h = 0.0, curr_idx = 0;
            let shield_temp = 20.0, chute_state = "STOWED";
            let mission_success = false, failure_reason = "Unknown";
            let mission_phase = "VERTICAL_ASCENT";
            
            const v_final_target = selectedDestination === "Mars" ? 9500 : 11500;
            const entry_altitude = selectedDestination === "Mars" ? 130000 : 155000;
            
            let transfer_complete_vel_h = 0.0, transfer_time = 0.0;
            let logCounter = 0;

            const runChunk = () => {
                if (!simulationRunning) return;

                const chunkSize = 100;
                for (let i = 0; i < chunkSize && time < 600000 && simulationRunning; i++) {
                    let s = stages[curr_idx]; // Changed to 'let' so it can be reassigned after stage separation
                    let current_total_mass = s.total_mass_at_end + s.fuel_curr;

                    if (current_total_mass <= 0) {
                        failure_reason = "Structural Failure (Zero Mass)";
                        break;
                    }

                    const r_p = mission_phase !== "RE_ENTRY" ? 6371000 : dest.radius;
                    const m_p = mission_phase !== "RE_ENTRY" ? M_EARTH : dest.mass;
                    const r = r_p + alt;
                    const g_accel = (G * m_p) / (r * r);

                    const h_s = mission_phase !== "RE_ENTRY" ? EARTH_SCALE_HEIGHT : dest.H;
                    const rho0 = mission_phase !== "RE_ENTRY" ? EARTH_RHO0 : dest.rho0;
                    const atmo_limit = mission_phase !== "RE_ENTRY" ? 100000 : dest.atmo;
                    const rho = alt < atmo_limit ? rho0 * Math.exp(-alt / h_s) : 0;

                    const v_tot = Math.sqrt(vel_v * vel_v + vel_h * vel_h);

                    let pitch_deg = 0;
                    if (mission_phase === "VERTICAL_ASCENT") {
                        if ((alt + (vel_v * vel_v) / (2 * g_accel)) >= 155000) {
                            mission_phase = "ORBITAL_INSERTION";
                        }
                        pitch_deg = 0;
                    } else if (mission_phase === "ORBITAL_INSERTION") {
                        // Gradual pitch program to maintain periapsis above 150km
                        if (alt < 120000) {
                            pitch_deg = 70; // More vertical to raise periapsis
                        } else if (alt < 140000) {
                            pitch_deg = 80; // Still gaining altitude
                        } else if (alt < 150000) {
                            pitch_deg = 85; // Almost horizontal
                        } else {
                            pitch_deg = 90; // Fully horizontal at 150km+
                        }
                        
                        // Only transition to transfer burn when orbit is stable above 150km
                        // Check that we're not descending too fast and altitude is good
                        if (vel_h >= 7800 && alt >= 145000 && vel_v > -100) {
                            mission_phase = "TRANSFER_BURN";
                        }
                    } else if (mission_phase === "TRANSFER_BURN") {
                        // In orbit - just burn horizontally
                        // The rocket is in orbit, so altitude variations are normal (elliptical orbit)
                        // As long as we stay above 100km atmosphere, we're fine
                        pitch_deg = 90; // Pure horizontal burn
                    } else if (mission_phase === "RE_ENTRY") {
                        pitch_deg = Math.atan2(vel_v, vel_h) * 180 / Math.PI;
                    }

                    const pitch_rad = pitch_deg * Math.PI / 180;

                    const thrust_active = (mission_phase !== "RE_ENTRY" && s.fuel_curr > 0) ? s.thrust : 0;
                    
                    // Use different CD and area for re-entry
                    const current_cd = mission_phase === "RE_ENTRY" ? s.cd_reentry : s.cd;
                    const current_area = mission_phase === "RE_ENTRY" ? s.area_reentry : s.area;
                    
                    let area_eff = current_area;
                    if (chute_state === "HALF") area_eff += numChutes * 20;
                    if (chute_state === "FULL") area_eff += numChutes * 100;

                    const f_drag_mag = 0.5 * rho * (v_tot * v_tot) * current_cd * area_eff;
                    const f_drag_x = v_tot > 0 ? -f_drag_mag * (vel_h / v_tot) : 0;
                    const f_drag_y = v_tot > 0 ? -f_drag_mag * (vel_v / v_tot) : 0;

                    const acc_x = (thrust_active * Math.sin(pitch_rad) + f_drag_x) / current_total_mass;
                    const acc_y = (thrust_active * Math.cos(pitch_rad) - (current_total_mass * g_accel) + f_drag_y) / current_total_mass;

                    vel_h += acc_x * TIME_STEP;
                    vel_v += acc_y * TIME_STEP;
                    alt += vel_v * TIME_STEP;

                    // Update graph data based on phase
                    if (logCounter % 50 === 0) {
                        const dataPoint = { 
                            alt: alt, 
                            velH: vel_h, 
                            velV: vel_v, 
                            time: time,
                            drag: f_drag_mag,
                            grav: current_total_mass * g_accel,
                            temp: shield_temp,
                            phase: mission_phase
                        };
                        
                        if (mission_phase === "VERTICAL_ASCENT" || mission_phase === "ORBITAL_INSERTION") {
                            ascentData.push(dataPoint);
                            if (ascentData.length > 500) ascentData.shift();
                        } else if (mission_phase === "TRANSFER_BURN") {
                            transferData.push(dataPoint);
                            if (transferData.length > 500) transferData.shift();
                        } else if (mission_phase === "RE_ENTRY") {
                            reentryData.push(dataPoint);
                            if (reentryData.length > 500) reentryData.shift();
                        }
                    }

                    if (mission_phase === "RE_ENTRY") {
                        const heating_rate = 0.00001 * rho * (v_tot ** 3) / 1000;
                        const cooling_rate = shield_temp > 20 ? 0.000000005 * (shield_temp ** 4) : 0;
                        shield_temp = Math.max(20, shield_temp + (heating_rate - cooling_rate) * TIME_STEP);

                        if (shield_temp > HEAT_SHIELD_LIMIT) {
                            failure_reason = `Heat Shield Failure (${shield_temp.toFixed(1)}°C)`;
                            simulationRunning = false;
                            break;
                        }
                    }

                    if (mission_phase === "RE_ENTRY" && chute_state === "STOWED") {
                        if (alt < 2500 && vel_v < 0) {
                            if (v_tot < 250) {
                                chute_state = "HALF";
                                log(`[${time.toFixed(1)}s] EVENT: PARACHUTES HALF-DEPLOYED`, 'event');
                            } else if (chute_state !== "FAILED") {
                                chute_state = "FAILED";
                                log(`[${time.toFixed(1)}s] ALERT: CHUTES SNAPPED (VEL > 250m/s)`, 'event');
                            }
                        }
                    }
                    if (mission_phase === "RE_ENTRY" && chute_state === "HALF" && alt < 500) {
                        chute_state = "FULL";
                        log(`[${time.toFixed(1)}s] EVENT: PARACHUTES FULL-DEPLOYED`, 'event');
                    }

                    if (mission_phase === "TRANSFER_BURN" && vel_h >= v_final_target) {
                        transfer_complete_vel_h = vel_h;
                        transfer_time = time;
                        mission_phase = "RE_ENTRY";
                        time = 250000.0;
                        alt = entry_altitude;

                        const entry_vel = selectedDestination === "Mars" ? 
                            Math.min(transfer_complete_vel_h * 0.75, 6500) : 
                            Math.min(transfer_complete_vel_h * 0.62, 7200);
                        const entry_angle = selectedDestination === "Mars" ? -3 * Math.PI / 180 : -5 * Math.PI / 180;

                        vel_h = entry_vel * Math.cos(entry_angle);
                        vel_v = entry_vel * Math.sin(entry_angle);
                        shield_temp = 20.0;

                        log(`\n[${transfer_time.toFixed(1)}s] TRANSFER COMPLETE (Vh=${transfer_complete_vel_h.toFixed(1)} m/s)`, 'event');
                        log(`[${time.toFixed(1)}s] ENTERING ${selectedDestination.toUpperCase()} ATMOSPHERE`, 'event');
                        log('─'.repeat(180));
                        continue;
                    }

                    if (mission_phase === "RE_ENTRY" && alt <= 0) {
                        if (Math.abs(vel_v) < 50.0) {
                            mission_success = true;
                            failure_reason = "Soft Landing";
                        } else {
                            failure_reason = `High Velocity Impact (${Math.abs(vel_v).toFixed(1)} m/s)`;
                        }
                        simulationRunning = false;
                        break;
                    }

                    if (mission_phase !== "RE_ENTRY" && alt < 0) {
                        failure_reason = "Crashed During Ascent";
                        simulationRunning = false;
                        break;
                    }

                    if (thrust_active > 0) {
                        s.fuel_curr = Math.max(0, s.fuel_curr - s.flow_rate * TIME_STEP);
                    }

                    if (s.fuel_curr <= 0 && curr_idx < stages.length - 1) {
                        log(`[${time.toFixed(1)}s] EVENT: STAGE ${s.num} SEPARATION`, 'event');
                        curr_idx++;
                    }

                    const log_interval = mission_phase === "RE_ENTRY" ? 5 : 
                                       mission_phase === "TRANSFER_BURN" ? 40 : 10;
                    
                    if (Math.floor(time / TIME_STEP) % (log_interval / TIME_STEP) === 0) {
                        const fuel_p = s.fuel_mass > 0 ? (s.fuel_curr / s.fuel_mass) * 100 : 0;
                        const total_acc_g = Math.sqrt(acc_x * acc_x + acc_y * acc_y) / 9.81;
                        const drag_kn = f_drag_mag / 1000;
                        const grav_kn = (current_total_mass * g_accel) / 1000;
                        const temp_disp = mission_phase === "RE_ENTRY" ? shield_temp.toFixed(1) : "-";

                        log(`${time.toFixed(1).padEnd(10)}${(alt/1000).toFixed(2).padEnd(10)}${fuel_p.toFixed(1).padEnd(9)}${total_acc_g.toFixed(2).padEnd(9)}${v_tot.toFixed(1).padEnd(10)}${vel_h.toFixed(1).padEnd(10)}${vel_v.toFixed(1).padEnd(10)}${drag_kn.toFixed(1).padEnd(11)}${grav_kn.toFixed(1).padEnd(11)}${temp_disp.padEnd(10)}${mission_phase}`);
                    }

                    time += TIME_STEP;
                    
                    if (logCounter++ % 50 === 0) {
                        document.getElementById('statusText').textContent = 
                            `Phase: ${mission_phase} | Time: ${time.toFixed(1)}s | Alt: ${(alt/1000).toFixed(1)}km | Vel: ${v_tot.toFixed(0)} m/s`;
                    }
                }

                if (simulationRunning && time < 600000) {
                    setTimeout(runChunk, 0);
                } else {
                    log('\n' + '='.repeat(60));
                    log(`MISSION STATUS: ${mission_success ? '✅ SUCCESS' : '❌ FAILED'}`, mission_success ? 'success' : 'failure');
                    log(`REASON: ${failure_reason}`);
                    log(`Impact Velocity: ${Math.abs(vel_v).toFixed(2)} m/s`);
                    if (mission_phase === "RE_ENTRY") {
                        log(`Final Heat Shield Temp: ${shield_temp.toFixed(1)}°C`);
                    }
                    log('='.repeat(60));
                    stopSimulation();
                }
            };

            runChunk();
        }

        generateStageInputs();
    </script>
